- name: Configure Nautilus
  community.general.dconf:
    key: "{{ item.key }}"
    value: "{{ item.value }}"
  loop:
    - key: /org/gnome/nautilus/preferences/default-folder-viewer
      value: "'list-view'"
    - key: /org/gnome/nautilus/list-view/default-zoom-level
      value: "'small'"
    - key: /org/gnome/nautilus/list-view/use-tree-view
      value: "true"
    - key: /org/gnome/nautilus/list-view/default-column-order
      value: "['name', 'size', 'type', 'owner', 'group', 'permissions', 'date_modified', 'date_accessed', 'date_created', 'recency', 'detailed_type']"
    - key: /org/gnome/nautilus/list-view/default-visible-columns
      value: "['name', 'size', 'type', 'owner', 'group', 'permissions', 'date_modified']"

- name: Copy the GNOME Nautilus bookmarks
  ansible.builtin.file:
    src: "{{ role_path }}/files/bookmarks"
    dest: "{{ lookup('env', 'HOME') }}/.config/gtk-3.0/bookmarks"
    state: link
    follow: false
    force: true
