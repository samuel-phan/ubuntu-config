- name: Install base packages
  become: true
  ansible.builtin.apt:
    name:
      - bash-completion
      - dconf-editor
      - gimp
      - git
      - gnome-tweaks
      - gnome-weather
      - gparted
      - htop
      - imagemagick-7.q16
      - mkvtoolnix-gui
      - neovim
      - pdfarranger
      - seahorse
      - sysstat
      - tig
      - tmux
      - trash-cli
      - tree
      - vim-gtk3
      - vlc
      - xsel
      - zsh
    state: latest

# APT

- name: Copy the file /etc/apt/apt.conf.d/99-no-pager.conf
  become: true
  ansible.builtin.copy:
    src: apt.conf.d/99-no-pager.conf
    dest: /etc/apt/apt.conf.d/99-no-pager.conf

# AWS CLI

- name: Install AWS CLI snap package
  become: true
  community.general.snap:
    name: aws-cli
    classic: true

# gcloud CLI

- name: Install prerequisites for gcloud
  become: true
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
      - curl
    state: latest

- name: Import the Google Cloud public key
  become: true
  ansible.builtin.shell: curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
  args:
    creates: /usr/share/keyrings/cloud.google.gpg

- name: Copy file /etc/apt/sources.list.d/google-cloud-sdk.list
  become: true
  ansible.builtin.copy:
    src: sources.list.d/google-cloud-sdk.list
    dest: /etc/apt/sources.list.d/google-cloud-sdk.list

- name: Copy file /etc/apt/preferences.d/google-cloud-sdk
  become: true
  ansible.builtin.copy:
    src: preferences.d/google-cloud-sdk
    dest: /etc/apt/preferences.d/google-cloud-sdk

- name: Install gcloud CLI
  become: true
  ansible.builtin.apt:
    name: google-cloud-cli
    state: latest
    update_cache: true
