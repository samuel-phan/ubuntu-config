- name: Download the GitHub CLI GPG key
  become: true
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    mode: '644'

- name: Render /etc/apt/sources.list.d/github-cli.list
  become: true
  ansible.builtin.template:
    src: sources.list.d/github-cli.list.j2
    dest: /etc/apt/sources.list.d/github-cli.list
    mode: '644'

- name: Install gh packages # noqa: package-latest
  become: true
  ansible.builtin.apt:
    name: gh
    state: latest
